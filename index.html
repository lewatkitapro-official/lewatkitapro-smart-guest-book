<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lewat Kita Smart Guest Book</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

</div>

    <main>

        <!-- ===================================== -->
        <!-- LANDING SCREEN -->
        <!-- ===================================== -->

       <section id="landing" class="screen active">

    <img
        src="assets/logo/logo-primary.png"
        alt="Lewat Kita Pro"
        class="logo intro-logo">

    <h1 class="intro-title">
        Smart Guest Book
    </h1>

    <p class="intro-subtitle">
        Merupakan suatu kehormatan atas
        kehadiran Anda.
    </p>

    <span class="tap-text intro-tap">
        Tap di sini untuk melanjutkan
    </span>

</section>

        <!-- ===================================== -->
        <!-- GUEST FORM -->
        <!-- ===================================== -->

<section id="guest-form" class="screen">

    <div class="card">

        <h2>Selamat Datang 👋</h2>

        <p class="subtitle">
            Silakan isi buku tamu digital.
        </p>

        <!-- ========================= -->
        <!-- COUNTER -->
        <!-- ========================= -->

        <div class="form-group">

            <label>Jumlah Kehadiran</label>

            <div class="counter">

                <button type="button" id="minus">−</button>

                <span id="pax">1</span>

                <button type="button" id="plus">+</button>

            </div>

        </div>

        <div class="divider"></div>

<!-- ========================= -->
<!-- REPRESENTATIVE -->
<!-- ========================= -->

<div
    class="form-group"
    id="representativeOption"
    style="display:none;">

    <label class="checkbox">

        <input
            type="checkbox"
            id="representative">

        Hanya isi nama perwakilan

    </label>

</div>

<!-- ========================= -->
<!-- GUEST FIELD -->
<!-- ========================= -->

<div class="form-group">

    <div id="guestFields">

    </div>

</div>

<div class="divider"></div>

<!-- ========================= -->
<!-- MESSAGE -->
<!-- ========================= -->

<div class="form-group">

    <label>Ucapan (Opsional)</label>

    <textarea
        id="message"
        rows="4"
        placeholder="Tulis ucapan untuk pengantin..."></textarea>

</div>

<button
    type="button"
    class="submit-btn"
    id="submitGuest">

    Check In

</button>

</section>

</main>

<!-- ==========================
SUCCESS SCREEN
========================== -->

<div id="successScreen" class="success-screen">

    <div class="success-card">

        <div class="success-circle">

            <svg
                width="42"
                height="42"
                viewBox="0 0 24 24"
                fill="none">

                <path
                    d="M20 6L9 17L4 12"
                    stroke="white"
                    stroke-width="3"
                    stroke-linecap="round"
                    stroke-linejoin="round"/>

            </svg>

        </div>

        <h2>Check In Berhasil</h2>

        <p>

            Data tamu berhasil disimpan.

            <br>

            Terima kasih atas kehadiran Anda. 🤍

        </p>

        <button
            id="nextGuest"
            class="success-btn">

            Check In Berikutnya

        </button>

    </div>

</div>

<script src="assets/js/script.js"></script>

</body>
</html>
